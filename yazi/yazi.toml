[plugin]
prepend_previewers = [
  # Archive previewer
  { mime = "application/*zip", run = "ouch" },
  { mime = "application/x-tar", run = "ouch" },
  { mime = "application/x-bzip2", run = "ouch" },
  { mime = "application/x-7z-compressed", run = "ouch" },
  { mime = "application/x-rar", run = "ouch" },
  { mime = "application/x-xz", run = "ouch" },
  { mime = "application/xz", run = "ouch" },
]

[[plugin.prepend_fetchers]]
id = "git"
url = "*"
run = "git"

[[plugin.prepend_fetchers]]
id = "git"
url = "*/"
run = "git"

[mgr]
linemode = "rtime"
sort_by = "natural"

[preview]
max_width = 1000
max_height = 2000

[opener]
zathura = [{ run = 'zathura "%s"', orphan = true, desc = "Zathura" }]
papers = [{ run = 'papers "%s"', orphan = true, desc = "Papers" }]
firefox = [{ run = 'firefox "%s"', orphan = true, desc = "Firefox" }]

[open]
prepend_rules = [
  { mime = "application/pdf", use = ["zathura", "papers", "firefox", "reveal"] },
]
